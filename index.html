<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厌学类型判断测评</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 厌学类型判断测评</h1>
            <p>科学诊断 · 精准干预 · 重拾学习动力</p>
        </div>

        <div class="content">
            <!-- 欢迎页 -->
            <div class="page active" id="welcome-page">
                <div class="welcome-content">
                    <div class="welcome-icon">📊</div>
                    <h2 class="welcome-title">了解厌学背后的真实原因</h2>
                    <div class="welcome-desc">
                        <p>厌学不是简单的不想上学，而是多种心理因素的复杂交织。</p>
                        <p>本测评基于心理学研究，通过<strong>28道专业题目</strong>，从8个维度全面分析，帮助您准确判断厌学类型，并提供针对性的干预建议。</p>
                    </div>

                    <div class="feature-grid">
                        <div class="feature-item">
                            <div class="feature-icon">🎯</div>
                            <div class="feature-text">8维精准诊断</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">📈</div>
                            <div class="feature-text">可视化结果</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">💡</div>
                            <div class="feature-text">个性化建议</div>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="startTest()">开始测评</button>
                    <p style="margin-top: 15px; font-size: 12px; color: #999;">*测评结果仅供参考，如需专业帮助请咨询心理专家</p>
                </div>
            </div>

            <!-- 测评页 -->
            <div class="page" id="test-page">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="question-number">问题 <span id="current-num">1</span> / 28</div>
                <div class="question-text" id="question-text"></div>
                <div class="options" id="options-container"></div>
            </div>

            <!-- 结果页 -->
            <div class="page" id="result-page">
                <div class="result-header">
                    <div class="result-type" id="result-type"></div>
                    <div class="result-subtitle">主要厌学类型</div>
                </div>

                <div class="chart-container">
                    <canvas id="radarChart" class="chart-canvas"></canvas>
                </div>

                <div class="details-section">
                    <div class="section-title">📋 详细诊断</div>
                    <div class="detail-card" id="main-diagnosis"></div>
                </div>

                <div class="details-section">
                    <div class="section-title">💡 干预建议</div>
                    <div class="detail-card" id="suggestions"></div>
                </div>

                <div class="details-section">
                    <div class="section-title">⚠️ 特别提醒</div>
                    <div class="detail-card warning" id="warning"></div>
                </div>

                <button class="btn btn-primary" onclick="restartTest()">重新测评</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
